<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>みんなの質問まとめ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF6F0;
    --card: #FFFFFF;
    --text: #4A413A;
    --text-soft: #8C7F73;
    --accent: #C98A6B;
    --accent-soft: #F3E3D8;
    --line: #EDE4D9;
    --radius: 20px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Zen Maru Gothic", "Hiragino Maru Gothic ProN", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.9;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 0 20px 96px; }

  /* ---- ヘッダー ---- */
  header { text-align: center; padding: 72px 0 40px; }
  .eyebrow {
    display: inline-block;
    font-size: 12px;
    letter-spacing: 0.28em;
    color: var(--accent);
    margin-bottom: 18px;
  }
  h1 { font-size: 30px; font-weight: 700; letter-spacing: 0.06em; }
  .subtitle { font-size: 14px; color: var(--text-soft); margin-top: 14px; }
  .intro {
    text-align: left;
    font-size: 14.5px;
    color: var(--text);
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 26px 30px;
    margin-top: 32px;
  }
  .intro p + p { margin-top: 1em; }

  /* ---- 検索・絞り込み ---- */
  .controls { margin: 40px 0 28px; }
  .search {
    width: 100%;
    font-family: inherit;
    font-size: 15px;
    color: var(--text);
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 14px 24px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search::placeholder { color: #C5B8AB; }
  .search:focus { border-color: var(--accent); }
  .filters { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
  .filter-btn {
    font-family: inherit;
    font-size: 13px;
    color: var(--text-soft);
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ---- Q&Aカード ---- */
  .qa-list { display: flex; flex-direction: column; gap: 16px; }
  .qa-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    transition: box-shadow 0.25s;
  }
  .qa-card.open { box-shadow: 0 8px 28px rgba(140, 110, 85, 0.10); }
  .qa-q {
    width: 100%;
    font-family: inherit;
    text-align: left;
    background: none;
    border: none;
    cursor: pointer;
    padding: 22px 24px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .qa-mark {
    flex-shrink: 0;
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 700;
    font-size: 15px;
    display: grid;
    place-items: center;
    margin-top: 2px;
  }
  .qa-q-body { flex: 1; }
  .qa-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 6px; }
  .chip {
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-soft);
    border-radius: 999px;
    padding: 2px 12px;
  }
  .source { font-size: 11px; color: var(--text-soft); letter-spacing: 0.06em; }
  .qa-q-text { font-size: 15.5px; font-weight: 500; line-height: 1.7; color: var(--text); }
  .qa-toggle {
    flex-shrink: 0;
    color: var(--accent);
    font-size: 18px;
    margin-top: 8px;
    transition: transform 0.25s;
  }
  .qa-card.open .qa-toggle { transform: rotate(45deg); }
  .qa-a { display: none; padding: 0 24px 26px 72px; }
  .qa-card.open .qa-a { display: block; }
  .qa-a-inner {
    border-top: 1px dashed var(--line);
    padding-top: 18px;
    font-size: 14.5px;
    color: var(--text);
  }
  .qa-a-inner p + p { margin-top: 1em; }
  .qa-date { margin-top: 14px; font-size: 11px; color: #C5B8AB; }

  /* ---- 空の状態・フッター ---- */
  .empty {
    text-align: center;
    color: var(--text-soft);
    font-size: 14px;
    padding: 56px 0;
    display: none;
  }
  footer {
    text-align: center;
    font-size: 12px;
    color: #C5B8AB;
    margin-top: 72px;
    letter-spacing: 0.08em;
  }

  @media (max-width: 480px) {
    header { padding: 52px 0 32px; }
    h1 { font-size: 24px; }
    .qa-a { padding-left: 24px; }
  }

  /* ---- 合言葉ゲート ---- */
  body.locked .wrap { display: none; }
  .gate {
    display: none;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  body.locked .gate { display: flex; }
  .gate-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 44px 36px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 12px 40px rgba(140, 110, 85, 0.08);
  }
  .gate-mark {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--accent-soft);
    display: grid; place-items: center;
    margin: 0 auto 18px;
    font-size: 22px;
  }
  .gate-title { font-size: 18px; font-weight: 700; letter-spacing: 0.04em; }
  .gate-msg { font-size: 13px; color: var(--text-soft); margin-top: 12px; line-height: 1.8; }
  .gate-input {
    width: 100%;
    font-family: inherit;
    font-size: 15px;
    text-align: center;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 13px 20px;
    margin-top: 22px;
    outline: none;
  }
  .gate-input:focus { border-color: var(--accent); }
  .gate-btn {
    width: 100%;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 999px;
    padding: 13px 20px;
    margin-top: 14px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .gate-btn:hover { opacity: 0.85; }
  .gate-error {
    font-size: 12px;
    color: #C0655A;
    margin-top: 12px;
    min-height: 1.5em;
  }

  /* ---- チャットボット ---- */
  .bot-fab {
    position: fixed;
    right: 20px; bottom: 20px;
    width: 58px; height: 58px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(140, 110, 85, 0.30);
    transition: transform 0.2s;
    z-index: 50;
  }
  .bot-fab:hover { transform: scale(1.06); }
  body.locked .bot-fab { display: none; }
  .bot-panel {
    position: fixed;
    right: 16px; bottom: 90px;
    width: min(360px, calc(100vw - 32px));
    max-height: min(540px, calc(100vh - 120px));
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: 0 16px 48px rgba(140, 110, 85, 0.22);
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 51;
  }
  .bot-panel.open { display: flex; }
  .bot-head {
    background: var(--accent-soft);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .bot-face {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--card);
    display: grid; place-items: center;
    font-size: 17px;
  }
  .bot-title { flex: 1; font-size: 14px; font-weight: 700; color: var(--text); }
  .bot-close {
    border: none; background: none;
    font-size: 18px; color: var(--text-soft);
    cursor: pointer; padding: 4px 8px;
  }
  .bot-msgs {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 85%;
    font-size: 13.5px;
    line-height: 1.8;
    padding: 10px 14px;
    border-radius: 16px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.bot { align-self: flex-start; background: var(--bg); border: 1px solid var(--line); border-bottom-left-radius: 6px; }
  .msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 6px; }
  .msg.bot .msg-chapter { font-size: 11px; color: var(--accent); display: block; margin-bottom: 4px; }
  .msg.bot p + p { margin-top: 0.8em; }
  .sug-btn {
    align-self: flex-start;
    max-width: 85%;
    font-family: inherit;
    text-align: left;
    font-size: 13px;
    line-height: 1.7;
    color: var(--accent);
    background: var(--accent-soft);
    border: none;
    border-radius: 16px;
    border-bottom-left-radius: 6px;
    padding: 10px 14px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .sug-btn:hover { opacity: 0.8; }
  .bot-input-row {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--line);
  }
  .bot-input {
    flex: 1;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 10px 16px;
    outline: none;
  }
  .bot-input:focus { border-color: var(--accent); }
  .bot-send {
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 999px;
    padding: 10px 18px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-mark">🔑</div>
    <p class="gate-title">合言葉を入力してください</p>
    <p class="gate-msg" id="gate-msg"></p>
    <input type="password" class="gate-input" id="gate-input" placeholder="合言葉">
    <button class="gate-btn" id="gate-btn">ひらく</button>
    <p class="gate-error" id="gate-error"></p>
  </div>
</div>

<div class="wrap">

  <header>
    <span class="eyebrow">Q &amp; A</span>
    <h1 id="site-title"></h1>
    <p class="subtitle" id="site-subtitle"></p>
    <div class="intro" id="site-intro"></div>
  </header>

  <div class="controls">
    <input type="search" class="search" id="search" placeholder="気になる言葉で検索できます（例：レンズ、ブレ）">
    <div class="filters" id="filters"></div>
  </div>

  <div class="qa-list" id="qa-list"></div>
  <p class="empty" id="empty">見つかりませんでした。別の言葉でも探してみてくださいね。</p>

  <footer>いただいたご質問は、こちらのページに少しずつ追加していきます。</footer>

</div>

<button class="bot-fab" id="bot-fab" aria-label="Q&Aボットをひらく">💬</button>
<div class="bot-panel" id="bot-panel">
  <div class="bot-head">
    <span class="bot-face">🐰</span>
    <span class="bot-title" id="bot-title"></span>
    <button class="bot-close" id="bot-close" aria-label="とじる">✕</button>
  </div>
  <div class="bot-msgs" id="bot-msgs"></div>
  <div class="bot-input-row">
    <input type="text" class="bot-input" id="bot-input" placeholder="ここに質問を入力">
    <button class="bot-send" id="bot-send">送信</button>
  </div>
</div>

<script src="data.js"></script>
<script>
  // ---- 合言葉ゲート（簡易ロック・data.jsのGATEで設定） ----
  const gateInput = document.getElementById("gate-input");
  const gateError = document.getElementById("gate-error");
  document.getElementById("gate-msg").textContent = GATE.message;

  function unlocked() {
    return localStorage.getItem("qa_gate") === GATE.password;
  }
  function tryUnlock() {
    if (gateInput.value.trim() === GATE.password) {
      localStorage.setItem("qa_gate", GATE.password);
      document.body.classList.remove("locked");
      render();
    } else {
      gateError.textContent = "合言葉がちがうようです。もう一度お試しくださいね。";
      gateInput.value = "";
      gateInput.focus();
    }
  }
  document.getElementById("gate-btn").addEventListener("click", tryUnlock);
  gateInput.addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });
  if (!unlocked()) document.body.classList.add("locked");

  // ---- データの流し込み（data.js を編集すれば反映されます） ----
  const catLabel = id => (CATEGORIES.find(c => c.id === id) || {}).label || "";
  const sourceLabel = id => SOURCES[id] || "";
  const toParagraphs = text =>
    text.trim().split(/\n\s*\n/).map(p => `<p>${p.replace(/\n/g, "<br>")}</p>`).join("");

  document.getElementById("site-title").textContent = SITE.title;
  document.getElementById("site-subtitle").textContent = SITE.subtitle;
  document.getElementById("site-intro").innerHTML = toParagraphs(SITE.intro);
  document.title = SITE.title;

  // ---- 絞り込みボタン ----
  const filtersEl = document.getElementById("filters");
  let activeCat = "all";
  const filterDefs = [{ id: "all", label: "すべて" }, ...CATEGORIES];
  filterDefs.forEach(def => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (def.id === "all" ? " active" : "");
    btn.textContent = def.label;
    btn.dataset.cat = def.id;
    btn.addEventListener("click", () => {
      activeCat = def.id;
      filtersEl.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b === btn));
      render();
    });
    filtersEl.appendChild(btn);
  });

  // ---- 検索 ----
  const searchEl = document.getElementById("search");
  searchEl.addEventListener("input", render);

  // ---- Q&Aカードの描画 ----
  const listEl = document.getElementById("qa-list");
  const emptyEl = document.getElementById("empty");

  function render() {
    const kw = searchEl.value.trim().toLowerCase();
    listEl.innerHTML = "";
    const hits = QA_LIST.filter(qa => {
      if (activeCat !== "all" && qa.category !== activeCat) return false;
      if (!kw) return true;
      return (qa.question + qa.answer + (qa.topic || "")).toLowerCase().includes(kw);
    });

    emptyEl.style.display = hits.length ? "none" : "block";
    emptyEl.textContent = kw
      ? "見つかりませんでした。右下のボットにも聞いてみてくださいね。"
      : "この章の質問は、これから追加していきます。楽しみにお待ちくださいね。";
    maybeAutoBot(kw, hits.length);

    hits.forEach(qa => {
      const card = document.createElement("div");
      card.className = "qa-card";
      card.innerHTML = `
        <button class="qa-q" aria-expanded="false">
          <span class="qa-mark">Q</span>
          <span class="qa-q-body">
            <span class="qa-meta">
              <span class="chip">${catLabel(qa.category)}</span>
              ${qa.topic ? `<span class="source">${qa.topic}</span>` : ""}
              <span class="source">｜ ${sourceLabel(qa.source)}</span>
            </span>
            <span class="qa-q-text">${qa.question}</span>
          </span>
          <span class="qa-toggle">＋</span>
        </button>
        <div class="qa-a">
          <div class="qa-a-inner">
            ${toParagraphs(qa.answer)}
            ${qa.date ? `<p class="qa-date">${qa.date}</p>` : ""}
          </div>
        </div>`;
      const btn = card.querySelector(".qa-q");
      btn.addEventListener("click", () => {
        const open = card.classList.toggle("open");
        btn.setAttribute("aria-expanded", open);
      });
      listEl.appendChild(card);
    });
  }

  // ---- チャットボット（QA_LISTをあいまい検索して答える・data.jsのBOTで文言設定） ----
  const botPanel = document.getElementById("bot-panel");
  const botMsgs = document.getElementById("bot-msgs");
  const botInput = document.getElementById("bot-input");
  document.getElementById("bot-title").textContent = BOT.name;

  // ひらがな⇔カタカナ・全角半角のゆれを吸収して比較する
  const norm = s => s.toLowerCase().normalize("NFKC")
    .replace(/[ァ-ヶ]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60))
    .replace(/\s+/g, "");
  const bigrams = s => {
    s = norm(s);
    if (s.length < 2) return [s];
    const out = [];
    for (let i = 0; i < s.length - 1; i++) out.push(s.slice(i, i + 2));
    return out;
  };

  function botSearch(query) {
    const terms = bigrams(query);
    return QA_LIST.map(qa => {
      const strong = norm(qa.question + " " + (qa.topic || ""));
      const weak = norm(qa.answer);
      let score = 0;
      terms.forEach(t => { if (strong.includes(t)) score += 3; else if (weak.includes(t)) score += 1; });
      return { qa, score };
    }).filter(x => x.score >= 3).sort((a, b) => b.score - a.score).slice(0, 3);
  }

  function addMsg(who, html) {
    const div = document.createElement("div");
    div.className = "msg " + who;
    div.innerHTML = html;
    botMsgs.appendChild(div);
    botMsgs.scrollTop = botMsgs.scrollHeight;
    return div;
  }
  const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;");

  function addSuggestion(qa) {
    const btn = document.createElement("button");
    btn.className = "sug-btn";
    btn.textContent = "Q. " + qa.question;
    btn.addEventListener("click", () => {
      addMsg("user", esc(qa.question));
      addMsg("bot",
        `<span class="msg-chapter">${catLabel(qa.category)}</span>` + toParagraphs(qa.answer));
    });
    botMsgs.appendChild(btn);
    botMsgs.scrollTop = botMsgs.scrollHeight;
  }

  function handleQuery(q) {
    const hits = botSearch(q);
    if (!hits.length) { addMsg("bot", esc(BOT.noHit)); return; }
    addMsg("bot", "こちらが参考になりそうです。気になる質問を押してみてくださいね👇");
    hits.forEach(h => addSuggestion(h.qa));
  }

  let botGreeted = false;
  function openBot() {
    botPanel.classList.add("open");
    if (!botGreeted) { addMsg("bot", esc(BOT.greeting)); botGreeted = true; }
    botInput.focus();
  }
  function sendBot() {
    const q = botInput.value.trim();
    if (!q) return;
    botInput.value = "";
    addMsg("user", esc(q));
    handleQuery(q);
  }
  document.getElementById("bot-fab").addEventListener("click", () =>
    botPanel.classList.contains("open") ? botPanel.classList.remove("open") : openBot());
  document.getElementById("bot-close").addEventListener("click", () => botPanel.classList.remove("open"));
  document.getElementById("bot-send").addEventListener("click", sendBot);
  botInput.addEventListener("keydown", e => { if (e.key === "Enter") sendBot(); });

  // ---- 検索0件 → ボット自動起動 ----
  let autoTimer = null, lastAutoKw = "";
  function maybeAutoBot(kw, hitCount) {
    clearTimeout(autoTimer);
    if (document.body.classList.contains("locked")) return;
    if (hitCount > 0 || kw.length < 2 || kw === lastAutoKw) return;
    autoTimer = setTimeout(() => {
      lastAutoKw = kw;
      openBot();
      addMsg("bot", esc(BOT.autoMessage));
      addMsg("user", esc(kw));
      handleQuery(kw);
    }, 900);
  }

  render();
</script>
</body>
</html>
